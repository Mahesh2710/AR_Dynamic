<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Haldiram AR Experience - Zero Jerk Edition</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', Roboto, sans-serif; background: #000; }
        .a-enter-vr, .a-enter-ar { display: none !important; }

        #welcome-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; background: #1a1a1a center/cover;
            display: flex; align-items: flex-end;
        }

        #bottom-sheet {
            width: 100%; height: 50%; border-radius: 40px 40px 0 0; position: relative;
            background: #121212 center/cover; transform: translateY(100%);
            animation: slideUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            box-shadow: 0 -15px 35px rgba(0,0,0,0.6);
        }

        #sheet-footer {
            position: absolute; bottom: 0; width: 100%; box-sizing: border-box;
            background: #000; padding: 20px 30px; display: flex;
            justify-content: space-between; align-items: center; border-top: 2px solid #FFF;
        }

        #play-button {
            width: 110px; height: 50px; background: #4185f4; border: none;
            border-radius: 25px; color: white; font-weight: bold; cursor: pointer;
            display: none; justify-content: center; align-items: center;
        }

        #scanner-ui {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 50; pointer-events: none;
        }
        .scanner-frame { width: 75vw; height: 75vw; position: relative; border: 2px solid rgba(255,255,255,0.2); border-radius: 20px; }
        .scanner-line { position: absolute; width: 100%; height: 4px; background: #a3ff00; top: 0; animation: scan 2s linear infinite; }
        
        #video-container {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; z-index: 40; display: none; 
        }
        #video-wrapper { position: relative; width: 100%; box-shadow: 0 10px 40px rgba(0,0,0,0.8); border-radius: 20px; border: 3px solid #FFF; overflow: hidden; }

        #close-sticky {
            position: absolute; top: 10px; right: 10px; width: 35px; height: 35px; 
            background: #ff3b30; color: white; border-radius: 50%; border: 2px solid white;
            z-index: 100; display: flex; justify-content: center; align-items: center; font-weight: bold;
        }

        #buy-now-cta {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 280px; height: 70px; display: none; z-index: 60;
            background-size: contain; background-repeat: no-repeat;
        }

        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        @keyframes slideUp { to { transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="welcome-page">
        <div id="bottom-sheet">
            <div id="sheet-footer">
                <div style="color: white;">
                    <h2 id="campaign-title" style="margin:0; font-size:1.1rem;">Loading...</h2>
                    <p style="margin:5px 0 0; font-size:0.8rem; color:#888;">Stable AR Experience</p>
                </div>
                <button id="play-button">Play</button>
            </div>
        </div>
    </div>

    <div id="scanner-ui">
        <div class="scanner-frame">
            <img id="dynamic-scanner-img" style="width:100%; opacity:0.5;">
            <div class="scanner-line"></div>
        </div>
        <p style="color:white; font-weight:bold; margin-top:20px;">HOLD STEADY TO SCAN</p>
    </div>

    <div id="video-container">
        <div id="video-wrapper">
            <button id="close-sticky">×</button>
        </div>
    </div>

    <a href="#" target="_blank" id="buy-now-cta"></a>

    <a-scene 
        id="ar-scene"
        mindar-image="autoStart: false; uiScanning: #none; filterMinCF: 0.0001; filterBeta: 10000; missTolerance: 50; warmupTolerance: 15;" 
        device-orientation-permission-ui="enabled: false"
        vr-mode-ui="enabled: false"
        renderer="antialias: true; colorManagement: true; logarithmicDepthBuffer: true; precision: high;">
        
        <a-assets>
            <video id="myVideo" loop="true" crossorigin="anonymous" playsinline webkit-playsinline preload="auto"></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" id="target-entity">
            <a-video id="ar-video-renderer" src="#myVideo" width="1" height="1.8" position="0 0 0" 
                     animation="property: opacity; from: 0; to: 1; dur: 500; startEvents: targetFound"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const API_URL = "https://jsonmap.com/api/mock/artest";
        const playBtn = document.querySelector('#play-button');
        const welcomePage = document.querySelector('#welcome-page');
        const video = document.querySelector('#myVideo');
        const sceneEl = document.querySelector('#ar-scene');

        async function initCampaign() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const targetId = urlParams.get('id');
                const ts = Date.now();

                const response = await fetch(`${API_URL}?t=${ts}`);
                const data = await response.json();
                
                let campaign = data.find(item => item.id === targetId) || data.find(item => item.is_active);
                if (!campaign) return;

                // Cache busting applied to all dynamic URLs
                welcomePage.style.backgroundImage = `url('${campaign.welcomePoster}?v=${ts}')`;
                document.querySelector('#bottom-sheet').style.backgroundImage = `url('${campaign.welcomePoster}?v=${ts}')`;
                document.querySelector('#campaign-title').innerText = campaign.campaignName;
                document.querySelector('#dynamic-scanner-img').src = `${campaign.scannerImg}?v=${ts}`;
                video.src = `${campaign.videoUrl}?v=${ts}`;
                document.querySelector('#buy-now-cta').style.backgroundImage = `url('${campaign.CTAimgUrl}?v=${ts}')`;
                document.querySelector('#buy-now-cta').href = campaign.CTAredirectUrl;

                // Zero Jerk Config: High filterBeta (10000) and high missTolerance (50)
                const mindFile = `${campaign.mindUrl}?v=${ts}`;
                sceneEl.setAttribute('mindar-image', `imageTargetSrc: ${mindFile}; autoStart: false; uiScanning: #none; filterMinCF: 0.0001; filterBeta: 10000; missTolerance: 50; warmupTolerance: 15;`);

                playBtn.style.display = 'flex';
            } catch (err) { console.error(err); }
        }

        window.addEventListener('load', initCampaign);

        playBtn.addEventListener('click', () => {
            video.play().then(() => video.pause());
            welcomePage.style.display = 'none';
            document.querySelector('#scanner-ui').style.display = 'flex';
            sceneEl.systems["mindar-image-system"].start();
        });

        const target = document.querySelector('#target-entity');
        target.addEventListener('targetFound', () => {
            document.querySelector('#scanner-ui').style.display = 'none';
            document.querySelector('#buy-now-cta').style.display = 'block';
            document.querySelector('#video-container').style.display = 'none';
            document.querySelector('a-assets').appendChild(video);
            video.play();
        });

        target.addEventListener('targetLost', () => {
            document.querySelector('#video-container').style.display = 'flex';
            document.querySelector('#video-wrapper').appendChild(video);
            video.play();
        });

        document.querySelector('#close-sticky').addEventListener('click', () => {
            document.querySelector('#video-container').style.display = 'none';
            video.pause();
        });
    </script>
</body>
</html>
