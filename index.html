<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>AR Experience Fixed</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        .a-enter-vr, .a-enter-ar { display: none !important; }

        #welcome-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; 
            background-image: url('https://raw.githubusercontent.com/Mahesh2710/ARData/main/DynamicData/poster/welcomeposter.png');
            background-size: 100% 100%; display: flex; align-items: flex-end;
        }

        #bottom-sheet {
            width: 100%; height: 50%; border-radius: 40px 40px 0 0; 
            background-image: url('https://raw.githubusercontent.com/Mahesh2710/ARData/main/DynamicData/poster/welcome.png');
            background-size: 100% 100%; transform: translateY(100%);
            animation: slideUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            display: flex; flex-direction: column;
        }

        #sheet-footer {
            margin-top: auto; background: #000; padding: 20px; display: flex;
            justify-content: space-between; align-items: center; border-top: 2px solid #FFF;
        }

        #play-button {
            width: 100px; height: 45px; background: #4185f4; border: none;
            border-radius: 20px; color: white; font-weight: bold; display: none; cursor: pointer;
        }

        #scanner-ui {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 50; pointer-events: none;
        }

        #video-container {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; z-index: 150; display: none;
        }
        #video-container video { width: 100%; border: 3px solid #FFF; border-radius: 20px; }

        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        @keyframes slideUp { to { transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="welcome-page">
        <div id="bottom-sheet">
            <div id="sheet-footer">
                <div style="color: white;"><h2 id="campaign-title" style="margin:0; font-size: 1.1rem;">Loading...</h2></div>
                <button id="play-button">Play</button>
            </div>
        </div>
    </div>

    <div id="scanner-ui">
        <div style="width: 70vw; height: 70vw; border: 2px solid #a3ff00; position: relative;">
            <div style="position: absolute; width: 100%; height: 4px; background: #a3ff00; animation: scan 2s linear infinite;"></div>
        </div>
    </div>

    <div id="video-container">
        <div id="video-wrapper" style="position:relative;">
            <button id="close-sticky" style="position:absolute; top:-10px; right:-10px; z-index:200; background:red; color:white; border-radius:50%; width:30px; height:30px; border:none; cursor:pointer;">X</button>
        </div>
    </div>

    <a-scene mindar-image="autoStart: false; uiScanning: #none;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="myVideo" loop="true" crossorigin="anonymous" playsinline preload="auto"></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" id="target-entity">
            <a-video 
                id="ar-video-renderer" 
                src="#myVideo" 
                visible="false"
                absolute-screen-lock>
            </a-video>
        </a-entity>
    </a-scene>

    <script>
        // The core component to stop resizing and rotating
        AFRAME.registerComponent('absolute-screen-lock', {
            tick: function () {
                const obj = this.el.object3D;
                // Force rotation to be perfectly flat
                obj.quaternion.set(0, 0, 0, 1);
                // Force scale to be consistent regardless of camera focus/distance
                obj.scale.set(1, 1, 1);
                // Force position to stay centered on the image
                obj.position.set(0, 0, 0.1);
            }
        });

        const API_URL = "https://jsonmap.com/api/mock/artest";
        const video = document.querySelector('#myVideo');
        const arVideoRenderer = document.querySelector('#ar-video-renderer');
        const sceneEl = document.querySelector('a-scene');
        const targetEntity = document.querySelector('#target-entity');

        let isSticky = true;
        let hasFound = false;

        async function init() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                const campaign = data.find(i => i.is_active);

                video.src = campaign.videoUrl;
                video.load();

                video.onloadedmetadata = () => {
                    const aspect = video.videoWidth / video.videoHeight;
                    // Maintain aspect ratio without engine distortion
                    arVideoRenderer.setAttribute('width', 2.1 * aspect);
                    arVideoRenderer.setAttribute('height', 2.1);
                };

                document.querySelector('#campaign-title').innerText = campaign.campaignName;
                sceneEl.setAttribute('mindar-image', { imageTargetSrc: campaign.mindUrl, autoStart: false });
                document.querySelector('#play-button').style.display = 'block';
            } catch (e) { console.error(e); }
        }

        document.querySelector('#play-button').addEventListener('click', () => {
            document.querySelector('#welcome-page').style.display = 'none';
            document.querySelector('#scanner-ui').style.display = 'flex';
            
            // Critical: Play/Pause to unlock video for mobile browsers
            video.play().then(() => video.pause());

            const arSystem = sceneEl.systems["mindar-image-system"];
            arSystem.start();
        });

        targetEntity.addEventListener('targetFound', () => {
            hasFound = true;
            isSticky = true;
            document.querySelector('#scanner-ui').style.display = 'none';
            document.querySelector('#video-container').style.display = 'none';
            
            // Move video back to assets to ensure AR plane can use it
            if(video.parentElement !== document.querySelector('a-assets')) {
                document.querySelector('a-assets').appendChild(video);
            }

            arVideoRenderer.setAttribute('visible', 'true');
            video.play();
        });

        targetEntity.addEventListener('targetLost', () => {
            arVideoRenderer.setAttribute('visible', 'false');
            if (hasFound && isSticky) {
                document.querySelector('#video-container').style.display = 'flex';
                document.querySelector('#video-wrapper').appendChild(video);
                video.play();
            }
        });

        document.querySelector('#close-sticky').addEventListener('click', () => {
            isSticky = false;
            document.querySelector('#video-container').style.display = 'none';
            document.querySelector('#scanner-ui').style.display = 'flex';
            video.pause();
            document.querySelector('a-assets').appendChild(video);
        });

        window.onload = init;
    </script>
</body>
</html>
