<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Locked & Front-Facing AR</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; }
        .a-enter-vr, .a-enter-ar { display: none !important; }

        /* Welcome Screen */
        #welcome-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; background-color: #1a1a1a; background-size: cover; background-position: center;
            display: flex; align-items: flex-end;
        }

        #bottom-sheet {
            width: 100%; height: 50%; border-radius: 40px 40px 0 0; position: relative;
            display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 -15px 35px rgba(0,0,0,0.6);
            background-color: #121212; background-size: cover; background-position: center;
            transform: translateY(100%);
            animation: slideUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        #sheet-content { flex: 1; padding: 40px 30px; display: flex; flex-direction: column; justify-content: center; background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%); }
        #sheet-footer { background: #000; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; border-top: 2px solid #FFF; }
        .footer-text h2 { color: white; margin: 0; font-size: 1.2rem; }
        .footer-text p { color: #888; margin: 5px 0 0 0; font-size: 0.9rem; }

        #play-button {
            width: 110px; height: 50px; background: #4185f4; border: none; border-radius: 25px; 
            cursor: pointer; display: none; justify-content: center; align-items: center;
            box-shadow: 0 4px 15px rgba(65, 133, 244, 0.4); color: white; font-weight: bold;
        }

        /* AR UI */
        #scanner-ui {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 50; pointer-events: none;
        }
        .scanner-frame { width: 75vw; height: 75vw; position: relative; display: flex; justify-content: center; align-items: center; }
        .scanner-img { width: 70%; opacity: 0.6; }
        .scanner-line { position: absolute; width: 100%; height: 4px; background: #a3ff00; top: 0; animation: scan 2s linear infinite; }
        
        /* Sticky Video */
        #video-container {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; z-index: 40; display: none; flex-direction: column; align-items: center;
        }
        #video-wrapper { position: relative; width: 100%; box-shadow: 0 10px 40px rgba(0,0,0,0.8); border-radius: 20px; background: #000; }
        #video-container video { width: 100%; border: 3px solid #FFF; border-radius: 20px; display: block; }
        #close-sticky {
            position: absolute; top: -15px; right: -15px; width: 40px; height: 40px; 
            background: #ff3b30; color: white; border-radius: 50%; border: 2px solid white;
            font-size: 24px; font-weight: bold; cursor: pointer; z-index: 100;
            display: flex; justify-content: center; align-items: center;
        }

        #buy-now-cta {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 280px; height: 70px; display: none; z-index: 60;
            background-size: contain; background-repeat: no-repeat; background-position: center;
        }

        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        @keyframes slideUp { to { transform: translateY(0); } }
        @keyframes fadeInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

    <div id="welcome-page">
        <div id="bottom-sheet">
            <div id="sheet-content"></div>
            <div id="sheet-footer">
                <div class="footer-text">
                    <h2 id="campaign-title">Loading...</h2>
                    <p>Unlock the next level experience</p>
                </div>
                <button id="play-button">Play</button>
            </div>
        </div>
    </div>

    <div id="scanner-ui">
        <div class="scanner-frame">
            <img id="dynamic-scanner-img" src="" class="scanner-img">
            <div class="scanner-line"></div>
        </div>
        <div style="color:white; margin-top:20px; font-weight:bold; text-shadow: 0 2px 4px #000;">SCAN THE PRODUCT</div>
    </div>

    <div id="video-container">
        <div id="video-wrapper">
            <button id="close-sticky">×</button>
        </div>
    </div>

    <div id="buy-now-cta"></div>

    <a-scene 
        id="ar-scene"
        mindar-image="autoStart: false; uiScanning: #none; filterMinCF: 0.000001; filterBeta: 0.0001; missTolerance: 15;" 
        device-orientation-permission-ui="enabled: false"
        vr-mode-ui="enabled: false"
        renderer="antialias: true; colorManagement: true; logarithmicDepthBuffer: true; precision: mediump;">
        
        <a-assets>
            <video id="myVideo" loop="true" crossorigin="anonymous" playsinline webkit-playsinline preload="auto"></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" id="target-entity">
            <a-video id="ar-video-renderer" src="#myVideo" width="1.2" height="2.1" position="0 0 0.1"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const API_URL = "https://jsonmap.com/api/mock/artest_";
        
        const playBtn = document.querySelector('#play-button');
        const welcomePage = document.querySelector('#welcome-page');
        const scannerUi = document.querySelector('#scanner-ui');
        const dynamicScannerImg = document.querySelector('#dynamic-scanner-img');
        const video = document.querySelector('#myVideo');
        const videoContainer = document.querySelector('#video-container');
        const videoWrapper = document.querySelector('#video-wrapper');
        const sceneEl = document.querySelector('#ar-scene');
        const arVideoRenderer = document.querySelector('#ar-video-renderer');
        const buyNowBtn = document.querySelector('#buy-now-cta');
        const targetEntity = document.querySelector('#target-entity');

        let isStickyEnabled = true;
        let hasFoundOnce = false;
        let lockedPosition = null;

        async function initCampaign() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const campaign = data.find(item => item.is_active === true);
                if (!campaign) return;

                welcomePage.style.backgroundImage = `url('${campaign.welcomePoster}')`;
                dynamicScannerImg.src = campaign.scannerImg;
                video.src = campaign.videoUrl;
                buyNowBtn.style.backgroundImage = `url('${campaign.CTAimgUrl}')`;
                
                sceneEl.setAttribute('mindar-image', {
                    imageTargetSrc: campaign.mindUrl,
                    autoStart: false,
                    uiScanning: '#none',
                    filterMinCF: 0.000001,
                    filterBeta: 0.0001
                });
                playBtn.style.display = 'flex';
            } catch (err) { console.error(err); }
        }

        window.addEventListener('load', initCampaign);

        playBtn.addEventListener('click', () => {
            welcomePage.style.display = 'none';
            scannerUi.style.display = 'flex';
            sceneEl.systems["mindar-image-system"].start();
        });

        targetEntity.addEventListener('targetFound', () => {
            hasFoundOnce = true;
            isStickyEnabled = true;
            lockedPosition = null; 
            scannerUi.style.display = 'none';
            videoContainer.style.display = 'none';
            buyNowBtn.style.display = 'block';
            
            if(video.parentElement !== document.querySelector('a-assets')) {
                document.querySelector('a-assets').appendChild(video);
            }
            arVideoRenderer.setAttribute('visible', 'true');
            video.play();
        });

        targetEntity.addEventListener('targetLost', () => {
            if (hasFoundOnce && isStickyEnabled) {
                arVideoRenderer.setAttribute('visible', 'false');
                videoContainer.style.display = 'flex';
                videoWrapper.appendChild(video);
                video.play();
            }
        });

        // REVOLUTIONARY LOCK & FRONT-FACING LOGIC
        sceneEl.addEventListener('tick', () => {
            if (targetEntity.object3D.visible && hasFoundOnce) {
                if (!lockedPosition) {
                    // Capture the stable world position
                    lockedPosition = new THREE.Vector3();
                    targetEntity.object3D.getWorldPosition(lockedPosition);
                } else {
                    // 1. Maintain the position pinned to the product
                    const localPos = targetEntity.object3D.parent.worldToLocal(lockedPosition.clone());
                    targetEntity.object3D.position.copy(localPos);
                    
                    // 2. FORCE FRONT-FACING & NO ROTATION
                    // Resetting rotation to 0 0 0 makes the video parallel to the world axes (front facing)
                    targetEntity.object3D.rotation.set(0, 0, 0);
                    
                    // 3. Optional: Ensure it faces camera perfectly (uncomment if you want billboard style)
                    // targetEntity.object3D.quaternion.copy(sceneEl.camera.quaternion);
                }
            }
        });

        document.querySelector('#close-sticky').addEventListener('click', () => {
            isStickyEnabled = false;
            videoContainer.style.display = 'none';
            scannerUi.style.display = 'flex';
            video.pause();
        });
    </script>
</body>
</html>
